<!DOCTYPE html>
<html>
  <head>
    <title>TestingBlockly</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      #blocklyDiv {
        height: calc(100% - 120px);
        width: 100%;
      }
      #controls {
        text-align: center;
        padding: 10px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
      }
      #runButton {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        margin-right: 20px;
      }
      #scaleSlider {
        width: 200px;
      }
      #output {
        width: 90%;
        margin: 10px auto;
        padding: 10px;
        border: 1px solid #ccc;
        background: #fafafa;
        min-height: 40px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <h1>Blockly with Categories</h1>
      <button id="runButton">Run Code</button>
      <label>
        Scale:
        <input id="scaleSlider" type="range" min="0.3" max="2" step="0.1" value="0.7">
      </label>
    </div>

    <div id="blocklyDiv"></div>
    <div id="output"></div>

    <!-- Toolbox -->
    <xml id="toolbox" style="display:none">
      <category name="Logic" colour="210">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
        <block type="logic_operation"></block>
        <block type="logic_boolean"></block>
        <block type="logic_null"></block>
        <block type="logic_ternary"></block>
      </category>
      <category name="Loops" colour="120">
        <block type="controls_repeat_ext"></block>
        <block type="controls_whileUntil"></block>
        <block type="controls_for"></block>
        <block type="controls_forEach"></block>
        <block type="controls_flow_statements"></block>
      </category>
      <category name="Math" colour="230">
        <block type="math_number"></block>
        <block type="math_arithmetic"></block>
        <block type="math_single"></block>
        <block type="math_trig"></block>
        <block type="math_constant"></block>
        <block type="math_number_property"></block>
      </category>
      <category name="Text" colour="160">
        <block type="text"></block>
        <block type="text_join"></block>
        <block type="text_length"></block>
        <block type="text_isEmpty"></block>
        <block type="text_indexOf"></block>
        <block type="text_charAt"></block>
        <block type="text_getSubstring"></block>
        <block type="text_changeCase"></block>
        <block type="text_trim"></block>
        <block type="text_print"></block>
        <block type="text_reverse"></block>
        <block type="text_67"></block> <!-- new block -->
      </category>
      <category name="Variables" custom="VARIABLE" colour="330"></category>
      <category name="Functions" custom="PROCEDURE" colour="290"></category>
    </xml>

    <script>
      // Define the 67 block BEFORE injection
      Blockly.common.defineBlocksWithJsonArray([{
        "type": "text_67",
        "message0": "67 block",
        "output": "String",
        "colour": 160,
        "tooltip": "Returns a long string of A's",
        "helpUrl": ""
      }]);

      Blockly.JavaScript['text_67'] = function(block) {
        const code = `"AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"`;
        return [code, Blockly.JavaScript.ORDER_ATOMIC];
      };

      // Inject Blockly with smaller scale
      const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        renderer: 'zelos',
        theme: Blockly.Themes.Classic,
        zoom: {
          controls: true,
          wheel: true,
          startScale: 0.7,
          maxScale: 2,
          minScale: 0.3,
          scaleSpeed: 1.2
        }
      });

      // Run Code button logic
      document.getElementById('runButton').addEventListener('click', () => {
        const code = Blockly.JavaScript.workspaceToCode(workspace);
        try {
          const result = eval(code);
          document.getElementById('output').innerText = 'Result: ' + (result ?? 'No output');
        } catch (e) {
          document.getElementById('output').innerText = 'Error: ' + e;
        }
      });

      // Scale slider logic
      document.getElementById('scaleSlider').addEventListener('input', (e) => {
        const scale = parseFloat(e.target.value);
        workspace.setScale(scale);
        workspace.resizeContents();
      });
    </script>
  </body>
</html>
